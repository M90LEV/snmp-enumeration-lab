<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNMP Lab Simulator v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --green: #39d353;
    --green-dim: #1a4a2e;
    --orange: #f78166;
    --orange-dim: #3d1a0f;
    --blue: #58a6ff;
    --blue-dim: #0d2a4a;
    --yellow: #e3b341;
    --yellow-dim: #3a2a00;
    --purple: #bc8cff;
    --red: #f85149;
    --muted: #8b949e;
    --text: #c9d1d9;
    --text-bright: #f0f6fc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOP BAR */
  #topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  #topbar .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 0.05em;
  }
  #topbar .logo span { color: var(--muted); font-weight: 400; }
  #topbar .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .badge-cpsa { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue); }
  .badge-safe { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
  #progress-wrap { margin-left: auto; display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--muted); }
  #progress-bar-outer { width: 120px; height: 6px; background: var(--border); border-radius: 3px; }
  #progress-bar-inner { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s; width: 0%; }
  #progress-label { color: var(--green); font-family: 'JetBrains Mono', monospace; font-size: 12px; min-width: 40px; }

  /* MAIN LAYOUT */
  #main {
    display: grid;
    grid-template-columns: 220px 1fr 360px;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  #sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar h3 {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--muted);
    padding: 14px 16px 8px;
    text-transform: uppercase;
  }
  .host-btn {
    display: flex;
    flex-direction: column;
    padding: 10px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    gap: 2px;
  }
  .host-btn:hover { background: var(--surface2); }
  .host-btn.active { border-left-color: var(--green); background: var(--green-dim); }
  .host-btn .host-ip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-bright);
  }
  .host-btn.active .host-ip { color: var(--green); }
  .host-btn .host-name { font-size: 11px; color: var(--muted); }
  .host-btn .host-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .tag {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .tag-v1 { background: var(--orange-dim); color: var(--orange); }
  .tag-v2c { background: var(--yellow-dim); color: var(--yellow); }
  .tag-telnet { background: var(--orange-dim); color: var(--orange); }
  .tag-tftp { background: var(--purple); opacity: 0.8; }
  .tag-http { background: var(--blue-dim); color: var(--blue); }
  .tag-noauth { background: var(--red); color: #fff; opacity: 0.85; }

  #sidebar .divider { height: 1px; background: var(--border); margin: 8px 0; }
  #sidebar h3.section2 { margin-top: 4px; }
  .cmd-progress-list { overflow-y: auto; flex: 1; padding-bottom: 8px; }
  .cmd-progress-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }
  .cmd-progress-item.done { color: var(--green); }
  .cmd-progress-item .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border); flex-shrink: 0;
  }
  .cmd-progress-item.done .dot { background: var(--green); }

  /* TERMINAL */
  #terminal-wrap {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #010409;
  }
  #terminal-titlebar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .dot-red { width: 12px; height: 12px; border-radius: 50%; background: #f85149; }
  .dot-yellow { width: 12px; height: 12px; border-radius: 50%; background: #e3b341; }
  .dot-green { width: 12px; height: 12px; border-radius: 50%; background: #39d353; }
  #terminal-titlebar span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-left: 8px;
  }
  #terminal-output {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    scroll-behavior: smooth;
  }
  .t-line { white-space: pre-wrap; word-break: break-all; }
  .t-prompt { color: var(--green); }
  .t-cmd { color: var(--text-bright); }
  .t-out { color: var(--text); }
  .t-err { color: var(--red); }
  .t-info { color: var(--blue); }
  .t-highlight { color: var(--yellow); }
  .t-success { color: var(--green); }
  .t-system { color: var(--purple); }

  #terminal-input-row {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    gap: 8px;
    flex-shrink: 0;
    background: #010409;
  }
  #terminal-prompt-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--green);
    white-space: nowrap;
    flex-shrink: 0;
  }
  #terminal-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-bright);
    caret-color: var(--green);
  }
  #cmd-hint {
    font-size: 11px;
    color: var(--muted);
    padding: 0 16px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-style: italic;
    flex-shrink: 0;
  }

  /* INTEL PANEL */
  #intel-panel {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #intel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .intel-tab {
    flex: 1;
    padding: 10px 8px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-align: center;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .intel-tab:hover { color: var(--text); }
  .intel-tab.active { color: var(--text-bright); border-bottom-color: var(--green); }
  #intel-content { flex: 1; overflow-y: auto; padding: 16px; }

  .intel-section { display: none; }
  .intel-section.visible { display: block; }

  .intel-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .intel-card h4 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .intel-card h4.offensive { color: var(--orange); }
  .intel-card h4.exam { color: var(--blue); }
  .intel-card h4.defence { color: var(--green); }
  .intel-card p { font-size: 12.5px; line-height: 1.6; color: var(--text); margin-bottom: 8px; }
  .intel-card p:last-child { margin-bottom: 0; }
  .intel-card code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--bg);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--yellow);
  }
  .intel-card ul { padding-left: 16px; }
  .intel-card li { font-size: 12.5px; line-height: 1.7; color: var(--text); }
  .intel-highlight {
    background: var(--orange-dim);
    border: 1px solid var(--orange);
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--orange);
    margin-bottom: 10px;
  }
  .exam-point {
    background: var(--blue-dim);
    border-left: 3px solid var(--blue);
    padding: 8px 12px;
    border-radius: 0 4px 4px 0;
    font-size: 12px;
    color: var(--text);
    margin-bottom: 8px;
  }
  .defence-item {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 12.5px;
  }
  .defence-item::before { content: "✓"; color: var(--green); flex-shrink: 0; font-weight: 700; }

  #intel-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    text-align: center;
    gap: 12px;
  }
  #intel-placeholder .placeholder-icon { font-size: 40px; opacity: 0.4; }
  #intel-placeholder p { font-size: 13px; line-height: 1.6; max-width: 240px; }

  /* Command ref quick panel */
  #quickref { padding: 0; }
  .qr-group { margin-bottom: 16px; }
  .qr-group h4 { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 8px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  .qr-cmd {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 6px 0;
    border-bottom: 1px solid #1c2330;
    cursor: pointer;
  }
  .qr-cmd:hover .qr-cmd-text { color: var(--green); }
  .qr-cmd-text { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text); word-break: break-all; }
  .qr-cmd-desc { font-size: 11px; color: var(--muted); }
  .qr-click-hint { font-size: 10px; color: var(--green); opacity: 0; }
  .qr-cmd:hover .qr-click-hint { opacity: 1; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo">SNMP<span>-lab</span> v2</div>
  <span class="badge badge-cpsa">CREST CPSA</span>
  <span class="badge badge-safe">Safe Simulation</span>
  <div id="progress-wrap">
    <span>Progress</span>
    <div id="progress-bar-outer"><div id="progress-bar-inner"></div></div>
    <span id="progress-label">0 / 39</span>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <h3>Target Hosts</h3>
    <div id="host-list"></div>
    <div class="divider"></div>
    <h3 class="section2">Commands Run</h3>
    <div class="cmd-progress-list" id="cmd-progress-list"></div>
  </div>

  <!-- TERMINAL -->
  <div id="terminal-wrap">
    <div id="terminal-titlebar">
      <div class="dot-red"></div><div class="dot-yellow"></div><div class="dot-green"></div>
      <span id="terminal-title">kali@attacker:~$</span>
    </div>
    <div id="terminal-output"></div>
    <div id="cmd-hint"></div>
    <div id="terminal-input-row">
      <span id="terminal-prompt-label">┌──(kali㉿attacker)-[~]<br>└─$&nbsp;</span>
      <input id="terminal-input" type="text" autocomplete="off" spellcheck="false" placeholder="Type a command or click one from the reference panel →">
    </div>
  </div>

  <!-- INTEL PANEL -->
  <div id="intel-panel">
    <div id="intel-tabs">
      <div class="intel-tab active" data-tab="intel">⚔ Intel</div>
      <div class="intel-tab" data-tab="quickref">📋 Commands</div>
    </div>
    <div id="intel-content">
      <div id="tab-intel" class="intel-section visible">
        <div id="intel-placeholder">
          <div class="placeholder-icon">⚡</div>
          <p>Run a command in the terminal to see offensive intel, CPSA exam notes, and defensive controls.</p>
        </div>
        <div id="intel-cards" style="display:none"></div>
      </div>
      <div id="tab-quickref" class="intel-section" id="quickref"></div>
    </div>
  </div>

</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const HOSTS = [
  { id:'rtr01', ip:'192.168.1.1',  name:'CORE-RTR-01',   desc:'Cisco IOS Core Router',         tags:['v2c','telnet'] },
  { id:'sw01',  ip:'192.168.1.2',  name:'ACCESS-SW-01',  desc:'Cisco Catalyst 2960 Switch',     tags:['v1'] },
  { id:'rtr02', ip:'10.10.0.1',    name:'BACKUP-RTR-01', desc:'Legacy Cisco Router',            tags:['v2c','telnet','tftp'] },
  { id:'tftp',  ip:'192.168.1.50', name:'TFTP-SRV-01',   desc:'Linux TFTP Server',              tags:['noauth'] },
  { id:'fw01',  ip:'192.168.10.5', name:'FW-01',         desc:'FortiGate Firewall',             tags:['http'] },
];

// Community strings
const COMMUNITIES = { public: true, private: true, internal: true, admin: true, cisco: true };

// ─── COMMAND DATABASE ───────────────────────────────────────────────────────
// Each command: { pattern (regex), output (fn or string), intel: {offensive, exam, defence} }

const COMMANDS = [

  // ── NMAP SNMP DISCOVERY ──
  {
    id:'nmap_udp_snmp',
    ref:'1', group:'Discovery',
    syntax:'nmap -sU -p 161 <target>',
    desc:'UDP scan port 161 (SNMP)',
    pattern: /nmap\s+-sU\s+-p\s*161\s+([\d.]+)/,
    output: (m) => `Starting Nmap 7.94 ( https://nmap.org )
Nmap scan report for ${m[1]}
Host is up (0.0012s latency).

PORT    STATE         SERVICE
161/udp open|filtered snmp

Nmap done: 1 IP address (1 host up) scanned in 2.14 seconds`,
    intel: {
      offensive:`SNMP runs on UDP/161. A filtered result is common — firewalls often block ICMP but leave SNMP open. Even "open|filtered" means the port is worth probing further with authentication.`,
      exam:[`SNMP uses UDP port 161 (agent) and UDP port 162 (trap/manager)`,`-sU performs a UDP scan; default TCP scans miss SNMP entirely`,`"open|filtered" means Nmap can't determine if filtered or open — typical for UDP`],
      defence:[`Block UDP/161 at the perimeter firewall`,`Allow SNMP only from specific management station IPs`,`Use SNMP v3 with authentication to reduce blind enumeration value`]
    }
  },
  {
    id:'nmap_snmp_scripts',
    ref:'2', group:'Discovery',
    syntax:'nmap -sU -p 161 --script snmp-info <target>',
    desc:'Run SNMP NSE scripts',
    pattern: /nmap\s+.*--script\s+snmp[\w-]+\s+([\d.]+)/,
    output: (m) => `Starting Nmap 7.94
Nmap scan report for ${m[1]}
Host is up.

PORT    STATE SERVICE
161/udp open  snmp
| snmp-info:
|   enterprise: cisco
|   engineIDFormat: mac
|   engineIDData: a1:b2:c3:d4:e5:f6
|   snmpEngineBoots: 47
|_  snmpEngineTime: 12d1h33m22s

Nmap done: 1 IP address scanned in 5.22 seconds`,
    intel: {
      offensive:`NSE scripts automate fingerprinting. Enterprise OID confirms this is Cisco hardware. Engine boots (47) and uptime reveal the device hasn't been rebooted in weeks — stable target, config unlikely to have changed recently.`,
      exam:[`Nmap NSE scripts for SNMP: snmp-info, snmp-sysdescr, snmp-brute, snmp-interfaces`,`snmp-info retrieves engine ID, enterprise OID, and uptime`,`snmpEngineBoots tracks how many times the SNMP engine has restarted`],
      defence:[`Restrict SNMP responses to authorised management IPs only`,`SNMPv3 engineID exposure is unavoidable but authentication limits usefulness`]
    }
  },
  {
    id:'nmap_snmp_range',
    ref:'3', group:'Discovery',
    syntax:'nmap -sU -p 161 192.168.1.0/24',
    desc:'Sweep subnet for SNMP hosts',
    pattern: /nmap\s+-sU\s+-p\s*161\s+([\d.]+\/\d+)/,
    output: (m) => `Starting Nmap 7.94
Nmap scan report for 192.168.1.1
161/udp open  snmp

Nmap scan report for 192.168.1.2
161/udp open  snmp

Nmap scan report for 192.168.1.50
161/udp open|filtered snmp

Nmap done: 256 IP addresses (3 hosts up) scanned in 38.71 seconds`,
    intel: {
      offensive:`Three SNMP-enabled hosts found on the /24. 192.168.1.1 and .2 are the priority — both showing open. 192.168.1.50 is the TFTP server. This gives us our full attack surface before any community string bruteforce.`,
      exam:[`Scanning full subnets with UDP is slow — Nmap defaults to sending 1 probe per port`,`Use --min-rate to speed up at the cost of accuracy`,`CIDR /24 = 256 addresses, /16 = 65536`],
      defence:[`Network segmentation — management VLAN isolation prevents subnet sweeps from user VLANs`,`IDS/IPS signatures can detect SNMP sweep patterns`]
    }
  },

  // ── ONESIXTYONE ──
  {
    id:'161_basic',
    ref:'4', group:'Community String Bruteforce',
    syntax:'onesixtyone 192.168.1.1 public',
    desc:'Test single community string',
    pattern: /onesixtyone\s+([\d.]+)\s+([\w]+)/,
    output: (m) => `Scanning 1 hosts, 1 communities
${m[1]} [${m[2]}] Cisco IOS Software, Version 12.4(24)T4, RELEASE SOFTWARE (fc2)`,
    intel: {
      offensive:`Bingo — community string "${m2last()}" is valid. The sysDescr response confirms Cisco IOS 12.4(24)T4 — an old, likely unpatched version. We now have read access to the entire SNMP MIB tree.`,
      exam:[`onesixtyone is a fast SNMP community string bruteforcer`,`Default community strings: public (read-only), private (read-write)`,`SNMPv1 and v2c have no encryption — community strings travel in plaintext`],
      defence:[`Rename default community strings to something non-guessable`,`Implement SNMP access control lists on Cisco: snmp-server community <string> RO <ACL>`,`SNMPv3 replaces community strings with username/password + encryption`]
    }
  },
  {
    id:'161_wordlist',
    ref:'5', group:'Community String Bruteforce',
    syntax:'onesixtyone -c /usr/share/doc/onesixtyone/dict.txt 192.168.1.1',
    desc:'Bruteforce with wordlist',
    pattern: /onesixtyone\s+-c\s+([\S]+)\s+([\d.]+)/,
    output: (m) => `Scanning 1 hosts, 50 communities
${m[2]} [public] Cisco IOS Software, Version 12.4(24)T4
${m[2]} [private] Cisco IOS Software, Version 12.4(24)T4
${m[2]} [internal] Cisco IOS Software, Version 12.4(24)T4`,
    intel: {
      offensive:`Three valid community strings found. "private" gives READ-WRITE access — we can now write to the MIB, meaning we could change routing tables, push configs, or reload the device. "internal" suggests someone customised the strings but used a weak value still in standard wordlists.`,
      exam:[`onesixtyone wordlist bruteforce is standard CPSA technique`,`public = typically RO, private = typically RW`,`Having RW community string = potential to modify device configuration via SNMP SET`],
      defence:[`Rate limiting SNMP at perimeter — block repeated UDP/161 probes from same source`,`Account lockout isn't native to SNMP — makes bruteforcing trivial`,`SNMPv3 supports auth failure logging and rate limiting per user`]
    }
  },
  {
    id:'161_multihost',
    ref:'6', group:'Community String Bruteforce',
    syntax:'onesixtyone -c /usr/share/doc/onesixtyone/dict.txt -i hosts.txt',
    desc:'Bruteforce multiple hosts',
    pattern: /onesixtyone\s+-c\s+\S+\s+-i\s+\S+/,
    output: () => `Scanning 5 hosts, 50 communities
192.168.1.1 [public] Cisco IOS Software, Version 12.4(24)T4
192.168.1.1 [private] Cisco IOS Software, Version 12.4(24)T4
192.168.1.2 [public] Cisco Catalyst 2960 Software (C2960-LANBASEK9-M)
10.10.0.1 [public] Cisco IOS Software, Version 12.2(33)
10.10.0.1 [cisco] Cisco IOS Software, Version 12.2(33)`,
    intel: {
      offensive:`Full network picture: all three Cisco devices respond to "public". The switch (192.168.1.2) only exposes v1. The legacy backup router uses a custom string "cisco" — still guessable. TFTP server and firewall don't respond to SNMP, but are still in scope via other vectors.`,
      exam:[`-i flag accepts a file of target IPs, one per line`,`Correlate community strings across hosts — reuse is common in enterprise networks`,`SNMPv1 on the switch means no bulk operations — but still readable`],
      defence:[`Central SNMP management policy — ensure all devices use the same hardened config baseline`,`Regular audits to detect devices using default or weak community strings`]
    }
  },

  // ── BRAA ──
  {
    id:'braa_basic',
    ref:'7', group:'Community String Bruteforce',
    syntax:'braa public@192.168.1.1:.1.3.6.*',
    desc:'Mass SNMP query with braa',
    pattern: /braa\s+([\w]+)@([\d.]+):([\S]+)/,
    output: () => `192.168.1.1:79ms:.1.3.6.1.2.1.1.1.0:Cisco IOS Software, Version 12.4(24)T4
192.168.1.1:79ms:.1.3.6.1.2.1.1.2.0:enterprises.9.1.620
192.168.1.1:81ms:.1.3.6.1.2.1.1.3.0:12 days, 1:33:22.00
192.168.1.1:82ms:.1.3.6.1.2.1.1.4.0:admin@corp.local
192.168.1.1:82ms:.1.3.6.1.2.1.1.5.0:CORE-RTR-01
192.168.1.1:83ms:.1.3.6.1.2.1.1.6.0:Server Room, Rack 3`,

    el.appendChild(d);
  });
}

  el.innerHTML = '';
  COMMANDS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'cmd-progress-item' + (completedCmds.has(c.id) ? ' done' : '');
    d.id = 'cprog-' + c.id;
    d.innerHTML = `<span class="dot"></span>${c.ref}. ${c.syntax.split(' ')[0]}`;
    el.appendChild(d);
  });
  updateProgress();
}

function updateProgress() {
  const total = COMMANDS.length;
  const done = completedCmds.size;
  const pct = (done / total * 100).toFixed(0);
  document.getElementById('progress-bar-inner').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${done} / ${total}`;
}

// ─── QUICK REF ───────────────────────────────────────────────────────────────
function renderQuickRef() {
  const el = document.getElementById('tab-quickref');
  const groups = {};
  COMMANDS.forEach(c => { if (!groups[c.group]) groups[c.group] = []; groups[c.group].push(c); });
  let html = '';
  GROUPS_ORDER.forEach(g => {
    if (!groups[g]) return;
    html += `<div class="qr-group"><h4>${g}</h4>`;
    groups[g].forEach(c => {
      html += `<div class="qr-cmd" onclick="injectCommand(${JSON.stringify(c.syntax)})">
        <span class="qr-cmd-text">${c.ref}. ${escHtml(c.syntax)}</span>
        <span class="qr-cmd-desc">${escHtml(c.desc)}</span>
        <span class="qr-click-hint">↵ click to run</span>
      </div>`;
    });
    html += '</div>';
  });
  el.innerHTML = `<div id="quickref">${html}</div>`;
}

function injectCommand(cmd) {
  // Replace target placeholder with active host IP
  let filled = cmd.replace(/<target>/g, activeHost.ip)
                   .replace(/192\.168\.1\.1/g, activeHost.ip)
                   .replace(/192\.168\.1\.2/g, activeHost.ip)
                   .replace(/10\.10\.0\.1/g, activeHost.ip)
                   .replace(/192\.168\.1\.50/g, activeHost.ip)
                   .replace(/192\.168\.10\.5/g, activeHost.ip);

  // Just fill the input — let user review and hit enter
  const inp = document.getElementById('terminal-input');
  inp.value = cmd; // keep original for clarity
  inp.focus();
  // Switch to intel tab
  activateTab('intel');
}

// ─── TERMINAL ────────────────────────────────────────────────────────────────
function printWelcome() {
  const out = document.getElementById('terminal-output');
  out.innerHTML = `<div class="t-line t-system">╔══════════════════════════════════════════════════════╗</div>
<div class="t-line t-system">║        SNMP Lab Simulator v2 — CREST CPSA Prep       ║</div>
<div class="t-line t-system">╚══════════════════════════════════════════════════════╝</div>
<div class="t-line t-info"></div>
<div class="t-line t-info">  Simulated network loaded. 5 hosts available.</div>
<div class="t-line t-info">  Select a host in the sidebar, then type commands.</div>
<div class="t-line t-info">  Click any command in the 📋 Commands panel to auto-fill.</div>
<div class="t-line t-info">  Intel panel updates with every command you run.</div>
<div class="t-line t-info"></div>
<div class="t-line t-highlight">  Active target: ${activeHost.ip} (${activeHost.name})</div>
<div class="t-line t-info"></div>`;
}

function print(text, cls='t-out') {
  const out = document.getElementById('terminal-output');
  const lines = text.split('\n');
  lines.forEach(l => {
    const d = document.createElement('div');
    d.className = 't-line ' + cls;
    d.textContent = l;
    out.appendChild(d);
  });
  out.scrollTop = out.scrollHeight;
}

function printPrompt(cmd) {
  const out = document.getElementById('terminal-output');
  const d = document.createElement('div');
  d.className = 't-line';
  d.innerHTML = `<span class="t-prompt">┌──(kali㉿attacker)-[~] [${activeHost.ip}]\n└─$ </span><span class="t-cmd">${escHtml(cmd)}</span>`;
  out.appendChild(d);
}

function onKeyDown(e) {
  const inp = e.target;
  if (e.key === 'Enter') {
    const cmd = inp.value.trim();
    inp.value = '';
    if (!cmd) return;
    history.unshift(cmd);
    histIdx = -1;
    processCommand(cmd);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) { histIdx++; inp.value = history[histIdx]; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; inp.value = history[histIdx]; } else { histIdx = -1; inp.value = ''; }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    // simple autocomplete: find matching command syntax
    const val = inp.value;
    const match = COMMANDS.find(c => c.syntax.startsWith(val) && val.length > 0);
    if (match) inp.value = match.syntax.replace('<target>', activeHost.ip);
  }
}

function processCommand(cmd) {
  printPrompt(cmd);

  // Built-ins
  if (cmd === 'clear' || cmd === 'cls') { document.getElementById('terminal-output').innerHTML = ''; return; }
  if (cmd === 'help') {
    print(`Available tools: nmap, onesixtyone, snmpwalk, snmpbulkwalk, snmpget, snmpset,\n  snmp-check, snmp-enum, braa, tftp, cat, msfconsole, use, set, run, curl\n\nType 'hosts' to list targets. Use UP/DOWN arrows for history. TAB to autocomplete.`, 't-info');
    return;
  }
  if (cmd === 'hosts') {
    HOSTS.forEach(h => print(`  ${h.ip.padEnd(15)} ${h.name.padEnd(20)} ${h.desc}`, activeHost.ip===h.ip?'t-success':'t-out'));
    return;
  }
  if (cmd === 'clear' || cmd === 'reset') { document.getElementById('terminal-output').innerHTML=''; return; }

  // Match against command database
  let matched = null;
  let matchResult = null;
  for (const c of COMMANDS) {
    const m = cmd.match(c.pattern);
    if (m) { matched = c; matchResult = m; break; }
  }

  if (matched) {
    const outputText = typeof matched.output === 'function' ? matched.output(matchResult) : matched.output;
    // small delay for realism
    setTimeout(() => {
      print(outputText, 't-out');
      print('', 't-out');
      completedCmds.add(matched.id);
      const el = document.getElementById('cprog-' + matched.id);
      if (el) { el.className = 'cmd-progress-item done'; }
      renderCommandProgress();
      showIntel(matched.intel);
      activateTab('intel');
    }, 180);
  } else {
    // Try partial match on tool name
    const tool = cmd.split(' ')[0];
    const known = ['nmap','onesixtyone','snmpwalk','snmpbulkwalk','snmpget','snmpset','snmp-check','snmp-enum','braa','tftp','msfconsole'];
    if (known.includes(tool)) {
      print(`Command not matched — check syntax. Click a command in the 📋 Commands panel or type 'help'.`, 't-err');
    } else {
      print(`bash: ${tool}: command not found`, 't-err');
    }
    const hint = document.getElementById('cmd-hint');
    const closest = COMMANDS.find(c => c.syntax.startsWith(tool));
    if (closest) hint.textContent = `Hint: try — ${closest.syntax}`;
    else hint.textContent = '';
  }
}

// ─── INTEL PANEL ─────────────────────────────────────────────────────────────
function showIntel(intel) {
  const placeholder = document.getElementById('intel-placeholder');
  const cards = document.getElementById('intel-cards');
  placeholder.style.display = 'none';
  cards.style.display = 'block';

  let html = `
    <div class="intel-card">
      <h4 class="offensive">⚔ Offensive Intel</h4>
      <p>${intel.offensive}</p>
    </div>
    <div class="intel-card">
      <h4 class="exam">📚 CPSA Exam Relevance</h4>
      ${intel.exam.map(e=>`<div class="exam-point">${e}</div>`).join('')}
    </div>
    <div class="intel-card">
      <h4 class="defence">🛡 Defence & Remediation</h4>
      ${intel.defence.map(d=>`<div class="defence-item">${d}</div>`).join('')}
    </div>`;
  cards.innerHTML = html;
  document.getElementById('intel-content').scrollTop = 0;
}

// ─── TABS ────────────────────────────────────────────────────────────────────
function setupTabs() {
  document.querySelectorAll('.intel-tab').forEach(tab => {
    tab.onclick = () => activateTab(tab.dataset.tab);
  });
}
function activateTab(name) {
  document.querySelectorAll('.intel-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.getElementById('tab-intel').classList.toggle('visible', name === 'intel');
  document.getElementById('tab-quickref').classList.toggle('visible', name === 'quickref');
}

// ─── UTIL ────────────────────────────────────────────────────────────────────
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
